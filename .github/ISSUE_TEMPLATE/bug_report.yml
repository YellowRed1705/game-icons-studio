name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: When I clicked X, Y happened instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Choose folder ...
        3. ...
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11"
    validations:
      required: false
  - type: input
    id: powershell
    attributes:
      label: PowerShell version
      placeholder: "7.4"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Log file (optional)
      description: You can paste the newest file from data/Logs here.
    validations:
      required: false
